server {
    listen 80;

    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;  # SPA fallback for client-side routing
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }

    location /health {
        proxy_pass http://backend:8080/actuator/health;
    }

    # SSE requires disabling buffering so events flush immediately instead of queuing
    location /api/v1/stream {
        proxy_pass http://backend:8080/api/v1/stream;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }
}
